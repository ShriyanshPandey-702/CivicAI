<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Scheme Dummy Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #success-message {
            display: none;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Apply for Government Scheme</h2>
    <form id="scheme-form">
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" required>
        </div>
        
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" required>
        </div>
        
        <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="state">State</label>
            <select id="state" name="state" required>
                <option value="">Select State</option>
                <option value="Maharashtra">Maharashtra</option>
                <option value="Delhi">Delhi</option>
                <option value="Karnataka">Karnataka</option>
                <option value="Tamil Nadu">Tamil Nadu</option>
                <option value="Uttar Pradesh">Uttar Pradesh</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="district">District</label>
            <input type="text" id="district" name="district" required>
        </div>
        
        <div class="form-group">
            <label for="caste">Caste/Category</label>
            <input type="text" id="caste" name="caste">
        </div>
        
        <div class="form-group">
            <label for="occupation">Occupation</label>
            <input type="text" id="occupation" name="occupation" required>
        </div>
        
        <div class="form-group">
            <label for="annual_income">Annual Income (₹)</label>
            <input type="number" id="annual_income" name="income" required>
        </div>
        
        <div class="form-group">
            <label for="land_ownership">Land Ownership</label>
            <input type="text" id="land_ownership" name="land_owned">
        </div>
        
        <div class="form-group">
            <label for="bank_account">Bank Account Info</label>
            <select id="bank_account" name="bank_account" required>
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="aadhaar_number">Aadhaar Number</label>
            <input type="text" id="aadhaar_number" name="aadhaar" required>
        </div>

        <button type="submit" id="submit-btn">Submit Application</button>
    </form>
    
    <div id="success-message">
        Application submitted successfully. Reference ID: DEMO12345
    </div>
</div>

<script>
    document.getElementById('scheme-form').addEventListener('submit', function(event) {
        // Prevent actual page reload
        event.preventDefault();
        
        // Hide form and show success message
        document.getElementById('scheme-form').style.display = 'none';
        document.getElementById('success-message').style.display = 'block';
    });

    // Auto-fill form from URL parameters (when opened manually via frontend)
    document.addEventListener("DOMContentLoaded", function() {
        const params = new URLSearchParams(window.location.search);
        
        // Map of HTML input names to URL query keys
        const textFields = {
            'full_name': 'name',
            'age': 'age',
            'district': 'district',
            'caste': 'caste',
            'occupation': 'occupation',
            'income': 'income',
            'aadhaar': 'aadhaar'
        };
        
        for (const [inputName, queryKey] of Object.entries(textFields)) {
            if (params.has(queryKey)) {
                const el = document.querySelector(`input[name="${inputName}"]`);
                if (el) el.value = params.get(queryKey);
            }
        }
        
        // Land ownership special case
        if (params.has('land_owned') || params.has('land_acres')) {
            const el = document.querySelector('input[name="land_owned"]');
            if (el) el.value = params.get('land_owned') || params.get('land_acres');
        }
        
        // Dropdowns (Gender, State)
        const selects = ['gender', 'state'];
        selects.forEach(sel => {
            if (params.has(sel)) {
                const formEl = document.querySelector(`select[name="${sel}"]`);
                if (formEl) {
                    const val = params.get(sel).toLowerCase();
                    Array.from(formEl.options).forEach(opt => {
                        if (opt.value.toLowerCase() === val || opt.text.toLowerCase() === val) {
                            opt.selected = true;
                        }
                    });
                }
            }
        });
        
        // Bank account boolean mapping
        if (params.has('has_bank_account') || params.has('bank_account')) {
            const formEl = document.querySelector('select[name="bank_account"]');
            if (formEl) {
                const val = (params.get('has_bank_account') || params.get('bank_account')).toLowerCase();
                formEl.value = (val === 'true' || val === 'yes') ? 'Yes' : 'No';
            }
        }
    });
</script>

</body>
</html>
